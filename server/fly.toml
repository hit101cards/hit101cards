# Fly.io 設定 — Hit101 サーバー
# 初回デプロイ前に `flyctl launch --no-deploy` で app 名が未使用か確認してください
# volume は `flyctl volumes create hit101_data --region nrt --size 1` で作成

app = "hit101-server"
primary_region = "nrt"

[build]

[env]
  NODE_ENV = "production"
  DATA_DIR = "/data"
  PORT = "3001"

[[mounts]]
  source = "hit101_data"
  destination = "/data"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 400
    soft_limit = 300

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

# Socket.IO は WebSocket 以外に long-polling も使う
# Fly.io の http_service は WS を透過的に通すので追加設定は不要

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
